name: Release

on:
  push:
    branches: [main, mobile]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: contains(github.event.head_commit.message, '!release') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ github.event.inputs.version_type }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${VERSION_INPUT:-patch}"
          else
            RELEASE_TYPE=$(echo "$COMMIT_MSG" | grep -oP '!release:\s*\K(major|minor|patch)' || echo "patch")
          fi

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          cd desktop
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if ! echo "$CURRENT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid semantic version in desktop/package.json: $CURRENT_VERSION"
            exit 1
          fi

          npm version "$CURRENT_VERSION" --no-git-tag-version --allow-same-version
          npm version "$RELEASE_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ..

          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" desktop/src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" desktop/src-tauri/Cargo.toml

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if ! git diff --quiet; then
            git add desktop/package.json desktop/package-lock.json desktop/src-tauri/tauri.conf.json desktop/src-tauri/Cargo.toml desktop/src-tauri/Cargo.lock
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ needs.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            job_name: linux-amd64
          - platform: ubuntu-22.04-arm
            args: ""
            job_name: linux-arm64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            job_name: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            job_name: macos-amd64
          - platform: windows-latest
            args: ""
            job_name: windows-amd64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libasound2-dev

      - name: Install dependencies (macos only)
        if: matrix.platform == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Set cross-compilation environment for macOS x86_64
        if: matrix.job_name == 'macos-amd64'
        run: |
          echo "CFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CXXFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "LDFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CC_x86_64_apple_darwin=clang -arch x86_64" >> $GITHUB_ENV
          echo "CXX_x86_64_apple_darwin=clang++ -arch x86_64" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.job_name }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Validate Tauri signing secrets
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          fi

          if [ -z "${RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret"
            exit 1
          fi

          key="$RAW_TAURI_SIGNING_PRIVATE_KEY"

          if printf '%s' "$key" | grep -q '\\n'; then
            key=$(printf '%b' "${key//\\n/\\n}")
            echo "::notice::Normalized escaped newlines in TAURI_SIGNING_PRIVATE_KEY"
          fi

          if printf '%s' "$key" | grep -qi 'public key'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks like a public key. Use the private key file without .pub"
            exit 1
          fi

          if ! printf '%s' "$key" | grep -qi 'secret key'; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY does not contain 'secret key' marker; verify secret format"
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY__"
            printf '%s\n' "$key"
            echo "__TAURI_KEY__"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-builds-${{ matrix.job_name }}
          path: |
            desktop/src-tauri/target/**/release/bundle/deb/*.deb
            desktop/src-tauri/target/**/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            desktop/src-tauri/target/**/release/bundle/msi/*.msi
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.tar.gz
            desktop/src-tauri/target/**/release/bundle/**/*.sig
            desktop/src-tauri/target/**/release/**/latest*.json
          retention-days: 2

  flatpak:
    needs: version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install flatpak-builder-tools
        run: |
          git clone --depth=1 https://github.com/flatpak/flatpak-builder-tools.git /tmp/fbt
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app tomlkit
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app /tmp/fbt/node

      - name: Generate offline sources
        run: |
          cd desktop && npm install --package-lock-only --legacy-peer-deps && cd ..
          flatpak-node-generator npm desktop/package-lock.json -o .github/flatpak/node-sources.json
          python3 /tmp/fbt/cargo/flatpak-cargo-generator.py desktop/src-tauri/Cargo.lock -o .github/flatpak/cargo-sources.json

      - name: Fetch Flathub shared-modules
        run: git clone --depth=1 https://github.com/flathub/shared-modules.git .github/flatpak/shared-modules

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: .github/flatpak/io.github.zxcloli666.SoundcloudDesktop.yml
          bundle: soundcloud-desktop.flatpak

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: soundcloud-desktop.flatpak

  release:
    needs: [version, build, docker, flatpak]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: '{tauri-builds-*,linux-flatpak,soundcloud-desktop-*.flatpak,android-apk}'
          merge-multiple: true

      - name: Flatten and deduplicate artifacts
        run: |
          mkdir -p /tmp/release
          find /tmp/artifacts -type f | while read -r f; do
            name=$(basename "$f")
            case "$f" in
              *aarch64-apple-darwin*.app.tar.gz) name="${name%.app.tar.gz}_arm64.app.tar.gz" ;;
              *x86_64-apple-darwin*.app.tar.gz)  name="${name%.app.tar.gz}_x64.app.tar.gz" ;;
            esac
            cp "$f" "/tmp/release/$name"
          done
          ls -la /tmp/release/

      - name: Generate updater manifest
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ['VERSION']
          repository = os.environ['REPOSITORY']
          release_dir = Path('/tmp/release')
          base_url = f"https://github.com/{repository}/releases/download/{version}"

          candidates = {
              'windows-x86_64': [
                  f'soundcloud-desktop_{version}_x64-setup.exe',
                  f'soundcloud-desktop_{version}_x64_en-US.msi',
              ],
              'linux-x86_64': [f'soundcloud-desktop_{version}_amd64.AppImage'],
              'linux-aarch64': [f'soundcloud-desktop_{version}_aarch64.AppImage'],
              'darwin-x86_64': ['soundcloud-desktop_x64.app.tar.gz'],
              'darwin-aarch64': ['soundcloud-desktop_arm64.app.tar.gz'],
          }

          platforms = {}
          for target, names in candidates.items():
              for name in names:
                  artifact = release_dir / name
                  signature = release_dir / f'{name}.sig'
                  if artifact.exists() and signature.exists():
                      platforms[target] = {
                          'url': f'{base_url}/{name}',
                          'signature': signature.read_text(encoding='utf-8').strip(),
                      }
                      break

          if not platforms:
              raise RuntimeError('No updater-compatible artifacts found for latest.json')

          manifest = {
              'version': version,
              'platforms': platforms,
          }

          (release_dir / 'latest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print('Generated /tmp/release/latest.json with platforms:', ', '.join(sorted(platforms.keys())))
          PY

      - name: Publish release
        uses: zxcloli666/release-helper@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          BUILD_COMMAND: "echo 'skip'"
          ASSET_PATTERNS: "/tmp/release/*"
          OPENAI_API_BASE_URL: ${{ secrets.AI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENAI_API_MODEL: deep-think
          LANGUAGE: "한국어"
