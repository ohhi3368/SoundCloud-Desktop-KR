services:
  storage:
    build: .
    restart: always
    ports:
      - "3002:3000"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      STORAGE_PATH: /data/storage
      TMP_PATH: /tmp/transcode
      MAX_TRANSCODES: ${MAX_TRANSCODES:-2}
      RUST_LOG: storage=info
    volumes:
      - storage_data:/data/storage
    tmpfs:
      - /tmp/transcode:size=2G,mode=1777
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: 2G

volumes:
  storage_data:
