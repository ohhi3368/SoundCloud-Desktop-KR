name: soundcloud-desktop

services:
  db:
    image: docker.io/library/postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: soundcloud
      POSTGRES_PASSWORD: soundcloud
      POSTGRES_DB: soundcloud_desktop
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundcloud -d soundcloud_desktop"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/zxcloli666/soundcloud-desktop/backend:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: soundcloud
      DATABASE_PASSWORD: soundcloud
      DATABASE_NAME: soundcloud_desktop
      SOUNDCLOUD_CLIENT_ID: ${SOUNDCLOUD_CLIENT_ID}
      SOUNDCLOUD_CLIENT_SECRET: ${SOUNDCLOUD_CLIENT_SECRET}
      SOUNDCLOUD_REDIRECT_URI: ${SOUNDCLOUD_REDIRECT_URI:-http://localhost:3000/auth/callback}
      SC_PROXY_URL: ${SC_PROXY_URL:-}
      STREAMING_SERVICE_URL: http://streaming:8080
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SUBSCRIPTIONS_SNAPSHOT_DIR: /snapshots
    volumes:
      - ./data/subscriptions:/snapshots
    depends_on:
      db:
        condition: service_healthy

  streaming:
    image: ghcr.io/zxcloli666/soundcloud-desktop/streaming:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: soundcloud
      DATABASE_PASSWORD: soundcloud
      DATABASE_NAME: soundcloud_desktop
      SC_PROXY_URL: ${SC_PROXY_URL:-}
      SC_COOKIES: ${SC_COOKIES:-}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://storage:3000}
      CDN_AUTH_TOKEN: ${CDN_AUTH_TOKEN:-}
      CDN_CLEANUP_DAYS: ${CDN_CLEANUP_DAYS:-7}
      CDN_MAX_SIZE_BYTES: ${CDN_MAX_SIZE_BYTES:-0}
      CDN_CLEANUP_INTERVAL_SECS: ${CDN_CLEANUP_INTERVAL_SECS:-3600}
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started

  storage:
    image: ghcr.io/zxcloli666/soundcloud-desktop/storage:latest
    restart: always
    expose:
      - "3000"
    environment:
      PORT: 3000
      ADMIN_TOKEN: ${CDN_AUTH_TOKEN:-}
      STORAGE_PATH: /data/storage
      TMP_PATH: /tmp/transcode
      MAX_TRANSCODES: ${MAX_TRANSCODES:-2}
      RUST_LOG: storage=info
    volumes:
      - storage-data:/data/storage
    tmpfs:
      - /tmp/transcode:size=2G,mode=1777

volumes:
  pgdata:
  storage-data:
